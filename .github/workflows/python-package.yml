name: Build Tabbed Version (main1.py)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller --onefile --name coil_helvix_tabbed --hidden-import PyQt6.QtPrintSupport --add-data "frontview.py;." --add-data "sideview.py;." --add-data "side_view.py;." --add-data "topview.py;." main1.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: coil-helvix-tabbed-windows
          path: dist/coil_helvix_tabbed.exe
